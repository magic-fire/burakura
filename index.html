<!DOCTYPE html>
<html>
    <body>
        <p>開始ボタンを押すとご使用の端末がもしかしたらフリーズします。最悪の場合端末が壊れる可能性がありますので、ご承知の上、興味があれば御使用ください。</p>
        <button type="button" onclick="brakura()">開始ボタン</button>
        <script>
            if (sessionStorage.getItem('key') !== null) {
                location.reload();
            }
            function brakura(){
                sessionStorage.setItem('key', 'hoge');
                location.reload();
            }
        </script>
    </body>
</html>
