<!DOCTYPE html>
<html>
    <body>
        <p>開始ボタンを押すとご使用の端末がもしかしたらフリーズします。最悪の場合端末が壊れる可能性がありますので、ご承知の上、興味があれば御使用ください。</p>
        <button type="button" onclick="brakura()">開始ボタン</button>
        <script>
            function brakura(){
                while(true){
                    let div = document.createElement('div');
                    div.textContent = '影の囁き…';
                    div.style.position = 'absolute';
                    div.style.top = Math.random() * window.innerHeight + 'px';
                    div.style.left = Math.random() * window.innerWidth + 'px';
                    div.style.color = 'rgba(255,0,0,' + Math.random() + ')';
                    document.body.appendChild(div);
                }
            }
        </script>
    </body>
</html>
